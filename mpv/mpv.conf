# Video output
vo=gpu-next
gpu-api=opengl
hwdec=nvdec-copy
profile=high-quality

# Scaling (spline36 is good quality without melting a 1650 Mobile)
scale=spline36
dscale=spline36
cscale=spline36

# Debanding
deband=yes
deband-iterations=2
deband-threshold=48
deband-range=16
deband-grain=16

# Motion interpolation
video-sync=display-resample
interpolation=yes
tscale=oversample

# Suppress noisy ffmpeg warnings
msg-level=ffmpeg/video=error

# Audio
volume=100
volume-max=150
audio-file-auto=fuzzy

# Subtitles
sub-auto=fuzzy
demuxer-mkv-subtitle-preroll=yes
sub-fix-timing=yes
blend-subtitles=yes

# Streaming
ytdl-format=bestvideo[height<=?1080]+bestaudio/best
ytdl=yes

# uosc requirements
osc=no
osd-bar=no
border=no


# Quality of life
keep-open=yes
save-position-on-quit=yes
autocreate-playlist=same
autofit-larger=90%x90%
cursor-autohide=1000
screenshot-format=png
screenshot-high-bit-depth=yes
screenshot-directory=~/Pictures/mpv-screenshots

# Streaming cache
[protocol.http]
cache=yes
demuxer-max-bytes=50MiB
demuxer-readahead-secs=20

[protocol.https]
profile=protocol.http
